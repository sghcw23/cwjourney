<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Choosing Wisely · ACT Booth</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800;9..144,900&family=DM+Sans:ital,wght@0,400;0,600;0,700;0,800;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #e8f4fd 0%, #f5e6ff 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 24px 16px; font-family: 'DM Sans', sans-serif;
  }
  .wrapper { width: 100%; max-width: 740px; }
  .header  { text-align: center; margin-bottom: 20px; }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: #fff; border-radius: 99px; padding: 6px 14px;
    font-size: 11px; font-family: 'DM Mono', monospace; color: #555;
    box-shadow: 0 2px 8px rgba(0,0,0,.08); margin-bottom: 10px; letter-spacing: .5px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 1.5s infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  h1 { font-family: 'Fraunces', serif; font-size: clamp(22px,5vw,30px); font-weight: 900; color: #111; line-height: 1.1; }

  .card { background: #fff; border-radius: 24px; padding: 28px; box-shadow: 0 8px 40px rgba(0,0,0,.10); min-height: 360px; }
  .card.animate { animation: fadeUp .25s ease forwards; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* stepper */
  .stepper { display: flex; align-items: center; margin-bottom: 22px; }
  .step-dot {
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid #e0e0e0;
    background: #fff; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; font-family: 'DM Mono', monospace; color: #bbb;
    flex-shrink: 0; transition: all .3s;
  }
  .step-dot.active  { border-color: #3a86ff; color: #3a86ff; background: #f0f5ff; }
  .step-dot.done    { border-color: #22c55e; background: #22c55e; color: #fff; }
  .step-dot.flagged { border-color: #f59e0b; background: #fff8e1; color: #b45309; font-size: 13px; }
  .step-line { flex: 1; height: 2px; background: #e0e0e0; transition: background .3s; }
  .step-line.done { background: #22c55e; }

  /* progress */
  .progress-wrap { margin-bottom: 20px; }
  .progress-labels { display: flex; justify-content: space-between; font-size: 11px; font-family: 'DM Mono', monospace; color: #999; margin-bottom: 5px; }
  .progress-track { height: 6px; background: #ebebeb; border-radius: 99px; overflow: hidden; }
  .progress-fill  { height: 100%; background: linear-gradient(90deg,#3a86ff,#8338ec); border-radius: 99px; transition: width .4s ease; }

  .step-label { font-size: 11px; font-family: 'DM Mono', monospace; color: #999; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
  .question   { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 800; line-height: 1.3; color: #111; margin-bottom: 6px; }
  .subtitle   { font-size: 13.5px; color: #666; line-height: 1.55; margin-bottom: 24px; }

  /* options */
  .options { display: flex; flex-direction: column; gap: 11px; }
  .option-btn {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px; border-radius: 14px;
    border: 2px solid #e0e0e0; background: #fafafa; cursor: pointer;
    text-align: left; font-family: 'DM Sans', sans-serif;
    font-size: 14.5px; font-weight: 600; color: #1a1a1a; transition: all .18s;
  }
  .option-btn:hover { border-color: #3a86ff; background: #f0f5ff; transform: translateX(4px); box-shadow: 0 4px 20px rgba(58,134,255,.15); }
  .opt-icon  { font-size: 22px; flex-shrink: 0; }
  .opt-arrow { margin-left: auto; color: #ccc; font-size: 18px; }

  /* resource */
  .res-header {
    display: flex; align-items: center; gap: 10px;
    background: #fff8e1; border: 1.5px solid #f59e0b;
    border-radius: 12px; padding: 10px 14px; margin-bottom: 16px;
  }
  .res-header span { font-size: 12px; font-family: 'DM Mono', monospace; color: #92400e; letter-spacing: .5px; font-weight: 600; }
  .res-title { font-family: 'Fraunces', serif; font-size: 19px; font-weight: 800; line-height: 1.3; color: #111; margin-bottom: 8px; }
  .res-body  { font-size: 13.5px; color: #444; line-height: 1.65; margin-bottom: 14px; }
  .tips { list-style: none; margin-bottom: 14px; }
  .tips li { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 8px; font-size: 13.5px; color: #333; line-height: 1.5; }
  .tips li::before { content: "\25B8"; color: #3a86ff; flex-shrink: 0; margin-top: 2px; }
  .res-box { background: #f0f5ff; border: 1.5px solid #b8d0ff; border-radius: 12px; padding: 12px 16px; margin-bottom: 14px; }
  .res-box .rb-title { font-weight: 700; font-size: 14px; color: #1a56db; margin-bottom: 4px; }
  .res-box .rb-desc  { font-size: 13px; color: #555; }

  /* dual playbook boxes */
  .playbook-pair { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .pb-box { border-radius: 12px; padding: 13px 16px; border: 1.5px solid; }
  .pb-box.cw { background: #f0f5ff; border-color: #b8d0ff; }
  .pb-box.qi { background: #f5f3ff; border-color: #c4b5fd; }
  .pb-box .pb-label { font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 1px; margin-bottom: 4px; }
  .pb-box.cw .pb-label { color: #1e40af; }
  .pb-box.qi .pb-label { color: #5b21b6; }
  .pb-box .pb-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .pb-box.cw .pb-title { color: #1a56db; }
  .pb-box.qi .pb-title { color: #4c1d95; }
  .pb-box .pb-desc  { font-size: 13px; }
  .pb-box.cw .pb-desc { color: #3b5fc0; }
  .pb-box.qi .pb-desc { color: #6d28d9; }

  .continue-note { font-size: 12px; color: #999; font-style: italic; margin-bottom: 12px; }

  /* CTA */
  .btn-continue {
    width: 100%; padding: 13px; border-radius: 12px;
    background: linear-gradient(135deg,#3a86ff,#8338ec);
    color: #fff; border: none; cursor: pointer;
    font-size: 14px; font-weight: 700; font-family: 'DM Sans', sans-serif;
    letter-spacing: .3px; transition: opacity .15s;
  }
  .btn-continue:hover { opacity: .88; }

  /* summary */
  .summary-items { display: flex; flex-direction: column; gap: 9px; margin-bottom: 20px; }
  .summary-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 11px 15px; border-radius: 12px; border: 1.5px solid #e0e0e0;
    font-size: 13.5px; font-family: 'DM Sans', sans-serif;
  }
  .summary-item.ok      { border-color: #86efac; background: #f0fdf4; color: #15803d; }
  .summary-item.gap     { border-color: #fcd34d; background: #fffbeb; color: #92400e; }
  .summary-item.unknown { border-color: #e0e0e0; background: #fafafa; color: #888; }
  .si-icon  { font-size: 17px; flex-shrink: 0; margin-top: 1px; }
  .si-label { font-weight: 600; line-height: 1.3; }
  .si-sub   { font-size: 12px; opacity: .75; margin-top: 3px; }

  /* QR section */
  .qr-section { margin-bottom: 20px; }
  .qr-section-title { font-size: 11px; font-family: 'DM Mono', monospace; color: #888; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }
  .qr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .qr-card {
    border: 1.5px solid #e0e0e0; border-radius: 14px;
    padding: 14px; text-align: center; background: #fafafa;
  }
  .qr-card.qi   { border-color: #c4b5fd; background: #f5f3ff; }
  .qr-card.cw   { border-color: #b8d0ff; background: #f0f5ff; }
  .qr-placeholder {
    width: 72px; height: 72px; margin: 0 auto 8px;
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .qr-placeholder svg { width: 72px; height: 72px; }
  .qr-label { font-size: 12px; font-weight: 700; font-family: 'DM Sans', sans-serif; color: #333; margin-bottom: 3px; line-height: 1.3; }
  .qr-sub   { font-size: 11px; color: #888; line-height: 1.3; }
  .qr-card.qi .qr-label { color: #4c1d95; }
  .qr-card.cw .qr-label { color: #1a56db; }

  /* idea board */
  .idea-section { margin-bottom: 20px; }
  .idea-board-card {
    border: 2px dashed #f59e0b; border-radius: 14px;
    padding: 16px 18px; background: #fffbeb;
  }
  .ib-heading { font-size: 14px; font-weight: 700; color: #92400e; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .ib-body    { font-size: 13px; color: #78350f; line-height: 1.6; }
  .domain-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .domain-tag {
    font-size: 11px; font-weight: 700; font-family: 'DM Mono', monospace;
    padding: 4px 10px; border-radius: 99px; border: 1.5px solid;
  }
  .domain-tag.d1 { background: #ffe4af; border-color: #9b928e; color: #000000; }
  .domain-tag.d2 { background: #dfefdd; border-color: #9b928e; color: #000000; }
  .domain-tag.d3 { background: #dad9eb; border-color: #9b928e; color: #000000; }
  .domain-tag.d4 { background: #b8e1ee; border-color: #9b928e; color: #000000; }
  .domain-tag.d5 { background: #f3e8ff; border-color: #9b928e; color: #000000; }

  /* char card */
  .char-card    { text-align: center; }
  .char-emoji   { font-size: 64px; line-height: 1; margin-bottom: 10px; }
  .char-youare  { font-size: 11px; font-family: 'DM Mono', monospace; color: #999; letter-spacing: 2px; margin-bottom: 6px; }
  .char-name    { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 900; color: #111; margin-bottom: 6px; }
  .char-tagline { font-size: 14px; color: #555; font-style: italic; line-height: 1.5; margin-bottom: 20px; }
  .nudge-box    { border-radius: 16px; padding: 14px 18px; margin-bottom: 18px; text-align: left; }
  .nudge-label  { font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 1px; margin-bottom: 5px; }
  .nudge-text   { font-size: 14px; font-weight: 600; }

  .btn-row    { display: flex; gap: 10px; }
  .btn-ghost  { flex:1; padding:12px; border-radius:12px; background:#f5f5f5; border:2px solid #e0e0e0; color:#444; cursor:pointer; font-size:13.5px; font-weight:600; font-family:'DM Sans',sans-serif; transition:background .15s; }
  .btn-ghost:hover { background:#ebebeb; }
  .btn-primary { flex:2; padding:12px; border-radius:12px; background:linear-gradient(135deg,#3a86ff,#8338ec); color:#fff; border:none; cursor:pointer; font-size:13.5px; font-weight:700; font-family:'DM Sans',sans-serif; }

  .thankyou  { text-align:center; padding:20px 0; }
  .ty-emoji  { font-size:56px; margin-bottom:14px; }
  .ty-title  { font-family:'Fraunces',serif; font-size:25px; font-weight:900; color:#111; margin-bottom:10px; }
  .ty-body   { font-size:14px; color:#555; line-height:1.65; margin-bottom:26px; }

  .footer { text-align:center; margin-top:14px; font-size:11px; color:#bbb; font-family:'DM Mono',monospace; }

  /* divider */
  .divider { height:1px; background:#f0f0f0; margin: 12px 0; }
  /* ---- combined final screen ---- */
  .final-grid {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 20px;
    align-items: start;
  }
  .final-left {
    text-align: center;
    position: sticky;
    top: 0;
  }
  .final-emoji   { font-size: 52px; line-height: 1; margin-bottom: 6px; }
  .final-youare  { font-size: 10px; font-family: 'DM Mono', monospace; color: #999; letter-spacing: 2px; margin-bottom: 4px; }
  .final-name    { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 900; color: #111; margin-bottom: 4px; line-height: 1.2; }
  .final-tagline { font-size: 12px; color: #666; font-style: italic; line-height: 1.4; margin-bottom: 10px; }
  .final-nudge   { border-radius: 12px; padding: 10px 13px; text-align: left; }
  .final-nudge .fn-label { font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: 1px; margin-bottom: 4px; }
  .final-nudge .fn-text  { font-size: 12.5px; font-weight: 600; line-height: 1.4; }

  .final-right { display: flex; flex-direction: column; gap: 10px; }

  /* compact summary rows */
  .sum-rows { display: flex; flex-direction: column; gap: 6px; }
  .sum-row {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 12px; border-radius: 10px; border: 1.5px solid;
    font-size: 12.5px; font-family: 'DM Sans', sans-serif; font-weight: 600;
  }
  .sum-row.ok  { border-color: #86efac; background: #f0fdf4; color: #15803d; }
  .sum-row.gap { border-color: #fcd34d; background: #fffbeb; color: #92400e; }
  .sum-row.unknown { border-color: #e2e8f0; background: #f8fafc; color: #94a3b8; }
  .sum-row .sr-icon { font-size: 14px; flex-shrink: 0; }

  /* compact QR row */
  .qr-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .qr-mini {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 10px; border: 1.5px solid;
  }
  .qr-mini.qi { border-color: #c4b5fd; background: #f5f3ff; }
  .qr-mini.cw { border-color: #b8d0ff; background: #f0f5ff; }
  .qr-mini svg { flex-shrink: 0; border-radius: 4px; }
  .qr-mini-text .qmt-title { font-size: 12px; font-weight: 700; }
  .qr-mini.qi .qmt-title { color: #4c1d95; }
  .qr-mini.cw .qmt-title { color: #1a56db; }
  .qr-mini-text .qmt-sub { font-size: 10.5px; color: #888; margin-top: 1px; }

  /* compact idea board */
  .idea-mini {
    border: 2px dashed #f59e0b; border-radius: 12px;
    padding: 10px 14px; background: #fffbeb;
  }
  .idea-mini .im-title { font-size: 12px; font-weight: 700; color: #92400e; margin-bottom: 4px; }
  .idea-mini .im-body  { font-size: 12px; color: #78350f; line-height: 1.5; }
  .domain-tags-mini { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
  .domain-tag-mini {
    font-size: 10px; font-weight: 700; font-family: 'DM Mono', monospace;
    padding: 3px 8px; border-radius: 99px; border: 1.5px solid;
  }
  .domain-tag-mini.d1 { background:#ffe4af; border-color:#9b928e; color:#000; }
  .domain-tag-mini.d2 { background:#dfefdd; border-color:#9b928e; color:#000; }
  .domain-tag-mini.d3 { background:#dad9eb; border-color:#9b928e; color:#000; }
  .domain-tag-mini.d4 { background:#b8e1ee; border-color:#9b928e; color:#000; }
  .domain-tag-mini.d5 { background:#f3e8ff; border-color:#9b928e; color:#000; }

  .final-btns { display: flex; gap: 10px; margin-top: 4px; }
  .final-btns .btn-ghost   { flex: 1; }
  .final-btns .btn-primary { flex: 2; }

  /* ---- email capture ---- */
  .email-section { display:flex; flex-direction:column; gap:5px; }
  .email-section .step-label { margin-bottom:0; }
  .email-row { display:flex; gap:7px; }
  .email-input {
    flex:1; padding:9px 12px; border-radius:9px;
    border:1.5px solid #e0e0e0; font-size:13px;
    font-family:'DM Sans',sans-serif; outline:none;
    transition:border-color .15s; background:#fafafa;
  }
  .email-input:focus { border-color:#3a86ff; background:#fff; }
  .email-input::placeholder { color:#bbb; }
  .email-send-btn {
    padding:9px 14px; border-radius:9px; white-space:nowrap;
    background:linear-gradient(135deg,#3a86ff,#8338ec);
    color:#fff; border:none; cursor:pointer;
    font-size:13px; font-weight:700; font-family:'DM Sans',sans-serif;
    transition:opacity .15s; flex-shrink:0;
  }
  .email-send-btn:hover  { opacity:.88; }
  .email-send-btn:disabled { opacity:.45; cursor:not-allowed; }
  .email-meta { display:flex; align-items:center; justify-content:space-between; }
  .email-status { font-size:11.5px; min-height:15px; }
  .email-status.ok    { color:#15803d; }
  .email-status.err   { color:#dc2626; }
  .email-copy-btn {
    font-size:11px; color:#94a3b8; background:none; border:none;
    cursor:pointer; font-family:'DM Mono',monospace; text-decoration:underline;
    padding:0; transition:color .15s;
  }
  .email-copy-btn:hover { color:#555; }

  /* ---- resource links ---- */
  .links-row { display: flex; flex-direction: column; gap: 7px; }
  .res-link {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border-radius: 10px; border: 1.5px solid;
    text-decoration: none; transition: all .18s;
  }
  .res-link:hover { transform: translateX(3px); }
  .res-link.qi { border-color: #c4b5fd; background: #f5f3ff; }
  .res-link.cw { border-color: #b8d0ff; background: #f0f5ff; }
  .res-link.sh { border-color: #86efac; background: #f0fdf4; }
  .rl-icon  { font-size: 18px; flex-shrink: 0; }
  .rl-text  { flex: 1; }
  .rl-title { font-weight: 700; font-size: 13px; }
  .res-link.qi .rl-title { color: #4c1d95; }
  .res-link.cw .rl-title { color: #1a56db; }
  .res-link.sh .rl-title { color: #15803d; }
  .rl-sub   { font-size: 11px; color: #888; margin-top: 1px; }
  .rl-arrow { margin-left: auto; color: #bbb; font-size: 14px; font-weight: 700; }
  .pb-link  { display:inline-block; margin-top:7px; font-size:12px; font-weight:700; text-decoration:none; }
  .pb-box.cw .pb-link { color:#1a56db; }
  .pb-box.qi .pb-link { color:#4c1d95; }

</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="badge"><span class="dot"></span> CHOOSING WISELY &middot; BOOTH ACTIVITY</div>
    <h1>Where Are You<br>in Your Choosing Wisely Journey?</h1>
  </div>
  <div class="card" id="card"></div>
  <p class="footer">~5 min activity &middot; Links to resources</p>
</div>

<script>

/* ---- DATA ---- */
var MILESTONES = [
  {
    id: 'validate_problem', stepNum: 1, label: 'Milestone 1 of 4',
    question: 'Is your idea backed by a real, measurable problem?',
    subtitle: 'Have you gotten data or evidence that confirms there is a problem?',
    yes: { label: 'Yes, I have evidence',          icon: '&#x2705;' },

  {

/* ---- HELPERS ---- */
function mkEl(tag, cls, html) {
  var n = document.createElement(tag);
  if (cls)             n.className = cls;
  if (html !== undefined) n.innerHTML = html;
  return n;
}
function animate() { card.classList.remove('animate'); void card.offsetWidth; card.classList.add('animate'); }

function pct() {
  if (phase === 'start') return 0;
  if (phase === 'card' || phase === 'done') return 100;
  var base = Math.round(((milestoneIdx + (showRes ? 0.6 : 0)) / 4) * 88) + 6;
  return Math.min(95, base);
}
function makeProgress() {
  var w = mkEl('div','progress-wrap');
  var l = mkEl('div','progress-labels');
  l.appendChild(mkEl('span',null,'PROGRESS')); l.appendChild(mkEl('span',null,pct()+'%'));
  var t = mkEl('div','progress-track'); var f = mkEl('div','progress-fill'); f.style.width = pct()+'%';
  t.appendChild(f); w.appendChild(l); w.appendChild(t); return w;
}
function makeStepper() {
  var wrap = mkEl('div','stepper');
  for (var i = 0; i < 4; i++) {
    var dot = mkEl('div','step-dot');
    if (i < answers.length) {
      dot.className = 'step-dot ' + (answers[i] ? 'done' : 'flagged');
      dot.innerHTML = answers[i] ? '&#x2713;' : '!';
    } else if (i === milestoneIdx && !showRes) {
      dot.className = 'step-dot active'; dot.innerHTML = String(i+1);
    } else {
      dot.innerHTML = String(i+1);
    }
    wrap.appendChild(dot);
    if (i < 3) {
      var line = mkEl('div','step-line');
      if (i < answers.length - 1 || (i < answers.length && showRes)) line.className = 'step-line done';
      wrap.appendChild(line);
    }
  }
  return wrap;
}

/* ---- ANSWER LOGIC ---- */
function answer(isYes) {
  answers.push(isYes);
  if (!isYes && firstGapChar === null) firstGapChar = MILESTONES[milestoneIdx].character;

  var m = MILESTONES[milestoneIdx];

  // QI milestone: ALWAYS show playbook resource regardless of answer
  if (m.id === 'know_qi') {
    phase = 'qi_resource';
    render(); return;
  }

  if (!isYes) {
    phase = 'resource'; render();
  } else {
    milestoneIdx++;
    if (milestoneIdx >= MILESTONES.length) {
      if (!firstGapChar) firstGapChar = 'champion';
      phase = 'summary';
    } else {
      phase = 'milestone';
    }
    render();
  }
}

function doRestart() {
  phase='start'; milestoneIdx=0; answers=[]; firstGapChar=null; showRes=false; isQIStep=false; render();
}


/* ---- EMAIL HELPERS ---- */
function buildSummaryText(noIdea) {
  var c     = CHARS[firstGapChar];
  var emoji = EMOJI_RAW[firstGapChar] || '';
  var sep   = '\n' + '─'.repeat(44) + '\n';
  var lines = [];
  lines.push('Choosing Wisely Booth Activity – Your Summary');
  lines.push(sep);
  lines.push('YOU ARE: ' + emoji + ' ' + c.name.toUpperCase());
  lines.push('\u201c' + c.tagline + '\u201d');
  lines.push('\nYour nudge: ' + c.nudge);
  lines.push(sep);
  if (noIdea) {
    lines.push('YOUR JOURNEY AHEAD');
    lines.push('');
    ['Validate the problem with data',
     'Learn the Choosing Wisely &amp; QI method',
     'Build the right team',
     'Register your project'
    ].forEach(function(l){ lines.push('  \u25CB  ' + l); });
  } else {
    lines.push('YOUR ROADMAP');
    lines.push('');
    MILESTONES.forEach(function(m,i){
      var ok = answers[i];
      lines.push((ok ? '  \u2705  ' : '  \u26A0\uFE0F  ') + (ok ? m.summaryOk : m.summaryGap));
    });
  }
  lines.push(sep);
  lines.push('RESOURCES');
  lines.push('');
  lines.push('\uD83D\uDCD7  CW Sharepoint:      ' + LINKS.cw);
  lines.push('\uD83D\uDCD8  The Art of Kaizen:       ' + LINKS.qi);
  lines.push('\uD83D\uDCCA  SingHealth Improvement Portal: ' + LINKS.portal);
  lines.push(sep);
  lines.push('Keep choosing wisely! \u2728');
  lines.push('\u2014 The Choosing Wisely Team');
  return lines.join('\n');
}

function copySummary(noIdea, btn) {
  var text = buildSummaryText(noIdea);
  var status = document.getElementById('email-status');
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){
        if (btn) btn.textContent = 'Copied! \u2713';
        showEmailStatus('Summary copied to clipboard', 'ok');
        setTimeout(function(){ if (btn) btn.textContent = 'Copy summary'; }, 2500);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      if (btn) btn.textContent = 'Copied! \u2713';
      showEmailStatus('Summary copied to clipboard', 'ok');
      setTimeout(function(){ if (btn) btn.textContent = 'Copy summary'; }, 2500);
    }
  } catch(e) { showEmailStatus('Could not copy — try again', 'err'); }
}

function showEmailStatus(msg, cls) {
  var el = document.getElementById('email-status');
  if (!el) return;
  el.textContent = msg;
  el.className = 'email-status ' + (cls || '');
  setTimeout(function(){ if (el.textContent === msg) el.textContent = ''; }, 4000);
}

function sendSummaryEmail(email, noIdea, sendBtn) {
  if (!GAS_URL) {
    showEmailStatus('Email not configured — use Copy instead', 'err');
    return;
  }
  var c = CHARS[firstGapChar];
  sendBtn.disabled = true;
  sendBtn.textContent = 'Sending…';

  var uid='f'+Date.now();
  var iframe=document.createElement('iframe');
  iframe.name=uid; iframe.style.cssText='display:none;position:fixed;width:0;height:0;border:0;';
  document.body.appendChild(iframe);
  var form=document.createElement('form');
  form.method='POST'; form.action=GAS_URL; form.target=uid; form.style.display='none';
  [['to_email',email],['character_name',c.name],['message',buildSummaryText(noIdea)]]
  .forEach(function(p){ var inp=document.createElement('input'); inp.type='hidden'; inp.name=p[0]; inp.value=p[1]; form.appendChild(inp); });
  document.body.appendChild(form); form.submit();
  setTimeout(function(){
    try{document.body.removeChild(form);document.body.removeChild(iframe);}catch(e){}
    sendBtn.disabled=false; sendBtn.innerHTML='Send &#x2709;';
    showEmailStatus('\u2705 Sent! Check your inbox.','ok');
    document.getElementById('summary-email-input').value='';
  }, 2500);
}

/* ---- MAIN RENDER ---- */
function render() {
  if (phase==='start')           { renderStart();           return; }
  if (phase==='no_idea')         { renderNoIdea();          return; }
  if (phase==='milestone')       { renderMilestone();       return; }
  if (phase==='resource')        { renderResource();        return; }
  if (phase==='qi_resource')     { renderQIResource();      return; }
  if (phase==='summary')         { renderSummary(false);    return; }
  if (phase==='summary_noidea')  { renderSummary(true);     return; }
  if (phase==='card')            { renderCharCard();        return; }
  if (phase==='done')            { renderDone();            return; }
}

render();
</script>
